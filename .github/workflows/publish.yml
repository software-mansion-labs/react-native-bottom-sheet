name: Publish
on:
  push:
    tags: [v*]
  workflow_dispatch:
permissions:
  contents: write
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - run: npm install -g npm@11.18.0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: .bun-version
      - run: bun install --frozen-lockfile
      - run: bun run prepare
      - name: Resolve npm dist-tag
        run: |
          tag=$(node -p "const version = require('./package.json').version; const match = version.match(/^[^-]+-([0-9A-Za-z]+)(?:[.-].*)?$/); match ? match[1] : 'latest'")
          echo "NPM_PUBLISH_TAG=$tag" >> "$GITHUB_ENV"
      - run: npm publish --access public --ignore-scripts --tag "$NPM_PUBLISH_TAG"
      - name: Create draft GitHub release
        if: github.ref_type == 'tag'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          args=("$TAG_NAME" --draft --title "$TAG_NAME" --notes "")

          if [[ "$TAG_NAME" == *next* ]]; then
            args+=(--prerelease)
          fi

          gh release create "${args[@]}"
